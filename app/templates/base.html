<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>えらぶ材すぽっと</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='20260629-ui3') }}">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <header class="site-header">
    <h1>えらぶ材すぽっと</h1>
    <p>沖永良部島の材を、必要な人へ。</p>
  </header>

  <main class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
          {% for message in messages %}
            <p>{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>

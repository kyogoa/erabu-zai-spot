{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2>ユーザー情報</h2>

  <div class="user-detail">
    <p><strong>LINE User ID:</strong> {{ user.line_user_id }}</p>
    <p><strong>名前:</strong> {{ user.display_name }}</p>
    <p><strong>拠点住所:</strong> {{ user.address }}</p>
    <p><strong>運搬情報:</strong></p>
    <p>{{ user.transport_info }}</p>
    <p><strong>登録日時:</strong> {{ user.created_at }}</p>
  </div>

  <div class="button-group">
    <a href="{{ url_for('users.edit', line_user_id=user.line_user_id) }}" class="btn-link">編集する</a>
    <a href="{{ url_for('materials.list_materials') }}" class="btn-link">材一覧に戻る</a>
  </div>
</section>
{% endblock %}

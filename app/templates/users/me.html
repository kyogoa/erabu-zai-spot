{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2 id="form-title">ユーザー情報</h2>
  <div id="status">LINE プロフィールを取得しています...</div>
  <p id="profile-note" class="hint"></p>

  <form id="user-form" method="post" action="{{ url_for('users.me_save') }}">
    <input type="hidden" name="line_user_id" id="line_user_id">
    <input type="hidden" name="user_id" id="user_id">
    <input type="hidden" name="userid" id="userid">

    <label>名前 *</label>
    <input type="text" name="display_name" id="display_name" required placeholder="例：山田太郎">

    <label>拠点住所 *</label>
    <input type="text" name="address" id="address" required placeholder="例：知名町、和泊町、現場名など">

    <label>運搬情報 *</label>
    <textarea name="transport_info" id="transport_info" rows="4" required placeholder="軽トラで搬送可能、4トンダンプで搬送可能など"></textarea>

    <button type="submit" id="submit-button">登録する</button>
  </form>
</section>

<script>
  async function initMeFlow() {
    const status = document.getElementById('status');
    if (!window.LIFF_ID || window.LIFF_ID.includes('{{') ) {
      status.textContent = 'LIFF が設定されていません。手動で情報を入力してください。';
      return;
    }

    try {
      await liff.init({ liffId: window.LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      const profile = await liff.getProfile();
      document.getElementById('line_user_id').value = profile.userId;
      document.getElementById('user_id').value = profile.userId;
      document.getElementById('userid').value = profile.userId;
      document.getElementById('profile-note').textContent = `LINE表示名: ${profile.displayName}`;

      const resp = await fetch('/users/me/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: profile.userId }),
      });
      const body = await resp.json();
      if (body.ok && body.exists) {
        document.getElementById('form-title').textContent = 'ユーザー情報（更新）';
        document.getElementById('display_name').value = body.user.display_name || '';
        document.getElementById('address').value = body.user.address || '';
        document.getElementById('transport_info').value = body.user.transport_info || '';
        document.getElementById('submit-button').textContent = '更新する';
        status.textContent = '登録済みの情報を読み込みました。';
      } else {
        document.getElementById('form-title').textContent = 'ユーザー情報（新規登録）';
        document.getElementById('submit-button').textContent = '登録する';
        status.textContent = '新規登録用の空フォームです。';
      }
    } catch (e) {
      console.error(e);
      status.textContent = 'ユーザー情報の取得に失敗しました。手動で入力してください。';
    }
  }

  initMeFlow();
</script>

{% endblock %}

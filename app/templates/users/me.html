{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2 id="form-title">ユーザー情報</h2>
  <div id="status">LINE プロフィールを取得しています...</div>
  <p id="profile-note" class="hint"></p>

  <form id="user-form" method="post" action="{{ url_for('users.me_save') }}">
    <input type="hidden" name="line_user_id" id="line_user_id">
    <input type="hidden" name="user_id" id="user_id">
    <input type="hidden" name="userid" id="userid">

    <label>名前 *</label>
    <input type="text" name="display_name" id="display_name" required placeholder="例：山田太郎">

    <label>拠点住所 *</label>
    <input type="text" name="address" id="address" required placeholder="例：知名町、和泊町、現場名など">

    <label>運搬情報 *</label>
    <textarea name="transport_info" id="transport_info" rows="4" required placeholder="軽トラで搬送可能、4トンダンプで搬送可能など"></textarea>

    <button type="submit" id="submit-button">登録する</button>
  </form>
</section>

<section class="card">
  <h3>自分の材登録履歴</h3>
  <div id="materials-container"><p>読み込み中...</p></div>
</section>

<section class="card">
  <h3>マッチング履歴</h3>
  <div id="matching-history-container"><p>読み込み中...</p></div>
</section>

<script>
  window.LIFF_ID = {{ LIFF_ID|tojson }};

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function renderMaterials(materials, userId) {
    const container = document.getElementById('materials-container');
    if (!materials || materials.length === 0) {
      container.innerHTML = '<p>まだ材登録がありません。</p>';
      return;
    }

    container.innerHTML = materials.map((material) => `
      <div class="material-history-item">
        <p><strong>${escapeHtml(material.title)}</strong>（${escapeHtml(material.material_type)}）</p>
        <p>場所: ${escapeHtml(material.location)} / 状態: ${escapeHtml(material.status)}</p>
        <p>登録日: ${escapeHtml(material.created_at)}</p>
        <form method="post" action="/materials/${encodeURIComponent(material.material_id)}/delete">
          <input type="hidden" name="line_user_id" value="${escapeHtml(userId)}">
          <button type="submit">削除する</button>
        </form>
      </div>
    `).join('');
  }

  function renderMatchingHistory(history) {
    const container = document.getElementById('matching-history-container');
    if (!history || history.length === 0) {
      container.innerHTML = '<p>まだマッチング履歴はありません。</p>';
      return;
    }

    container.innerHTML = history.map((match) => `
      <div class="matching-history-item">
        <p><strong>材ID:</strong> ${escapeHtml(match.material_id)}</p>
        <p><strong>操作:</strong> ${escapeHtml(match.action)}</p>
        <p><strong>状態:</strong> ${escapeHtml(match.status)}</p>
        <p><strong>メッセージ:</strong> ${escapeHtml(match.message)}</p>
        <p><strong>日時:</strong> ${escapeHtml(match.created_at)}</p>
      </div>
    `).join('');
  }

  async function initMeFlow() {
    const status = document.getElementById('status');
    if (!window.LIFF_ID) {
      status.textContent = 'LIFF が設定されていません。手動で情報を入力してください。';
      return;
    }

    try {
      await liff.init({ liffId: window.LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: window.location.href });
        return;
      }
      const profile = await liff.getProfile();
      document.getElementById('line_user_id').value = profile.userId;
      document.getElementById('user_id').value = profile.userId;
      document.getElementById('userid').value = profile.userId;
      document.getElementById('profile-note').textContent = `LINE表示名: ${profile.displayName}`;

      const resp = await fetch('/users/me/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: profile.userId }),
      });
      const body = await resp.json();
      renderMaterials(body.materials || [], profile.userId);
      renderMatchingHistory(body.matching_history || []);
      if (body.ok && body.exists) {
        document.getElementById('form-title').textContent = 'ユーザー情報（更新）';
        document.getElementById('display_name').value = body.user.display_name || '';
        document.getElementById('address').value = body.user.address || '';
        document.getElementById('transport_info').value = body.user.transport_info || '';
        document.getElementById('submit-button').textContent = '更新する';
        status.textContent = '登録済みの情報を読み込みました。';
      } else {
        document.getElementById('form-title').textContent = 'ユーザー情報（新規登録）';
        document.getElementById('submit-button').textContent = '登録する';
        status.textContent = '新規登録用の空フォームです。';
      }
    } catch (e) {
      console.error(e);
      status.textContent = 'ユーザー情報の取得に失敗しました。手動で入力してください。';
    }
  }

  initMeFlow();
</script>

{% endblock %}

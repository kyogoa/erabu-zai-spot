{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2>ユーザー情報を登録する</h2>

  <form method="post" action="{{ url_for('users.submit') }}">
    <input type="hidden" name="line_user_id" id="line_user_id">
    <input type="hidden" name="user_id" id="user_id">
    <input type="hidden" name="userid" id="userid">

    <label>名前 *</label>
    <input type="text" name="display_name" id="display_name" required placeholder="例：山田太郎">

    <label>拠点住所 *</label>
    <input type="text" name="address" required placeholder="例：知名町、和泊町、現場名など">

    <label>運搬情報 *</label>
    <textarea name="transport_info" rows="4" required placeholder="軽トラで搬送可能、4トンダンプで搬送可能など"></textarea>

    <button type="submit">登録する</button>
  </form>
</section>

<script>
  window.LIFF_ID = {{ LIFF_ID|tojson }};
</script>
<script src="{{ url_for('static', filename='js/liff.js') }}"></script>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2>解体物件を登録する</h2>

  <form method="post" action="{{ url_for('materials.submit_demolition') }}" enctype="multipart/form-data">
    <input type="hidden" name="line_user_id" id="line_user_id">
    <input type="hidden" name="display_name" id="display_name">
    <p class="hint">LINE内で開くと自動的にユーザー情報が設定されます。建物の状態や見学可能期間が分かる範囲で入力してください。</p>

    <label>登録者 *</label>
    <select name="registrant_type" required>
      <option value="">選択してください</option>
      <option value="家主">家主</option>
      <option value="解体業者">解体業者</option>
      <option value="管理者・代理人">管理者・代理人</option>
      <option value="その他">その他</option>
    </select>

    <label>物件名 *</label>
    <input type="text" name="property_name" required placeholder="例：旧山田邸、知名町の空き家など">

    <label>所在地 *</label>
    <input type="text" name="location" required placeholder="例：知名町、和泊町、字名、現場名など">

    <label>所有者</label>
    <input type="text" name="owner_name" placeholder="例：山田太郎、法人名など">

    <label>解体予定日</label>
    <input type="date" name="demolition_date">

    <label>解体業者</label>
    <input type="text" name="demolition_contractor" placeholder="例：〇〇解体、未定など">

    <label>見学期間</label>
    <input type="text" name="viewing_period" placeholder="例：6月下旬まで、土日の午前中など">

    <label>建物用途</label>
    <select name="building_use">
      <option value="">選択してください</option>
      <option value="住宅">住宅</option>
      <option value="店舗">店舗</option>
      <option value="倉庫">倉庫</option>
      <option value="事務所">事務所</option>
      <option value="その他">その他</option>
    </select>

    <label>構造</label>
    <select name="structure">
      <option value="">選択してください</option>
      <option value="木造">木造</option>
      <option value="鉄骨造">鉄骨造</option>
      <option value="鉄筋コンクリート造">鉄筋コンクリート造</option>
      <option value="ブロック造">ブロック造</option>
      <option value="その他">その他</option>
    </select>

    <label>階数</label>
    <input type="text" name="floors" placeholder="例：平屋、2階建てなど">

    <label>築年数</label>
    <input type="text" name="building_age" placeholder="例：築40年、昭和50年代など">

    <label>建物写真（複数選択可）</label>
    <input type="file" name="building_image_files" accept="image/*" multiple>

    <label>建物写真URL（任意・複数可）</label>
    <textarea name="building_photo_urls_text" rows="3" placeholder="Google Drive等の画像URL"></textarea>

    <label>状態評価</label>
    <textarea name="condition_evaluation" rows="4" placeholder="例：柱や建具は再利用できそう、雨漏りあり、現地確認が必要など"></textarea>

    <label>備考</label>
    <textarea name="notes" rows="3" placeholder="連絡時の注意点、駐車場所、立ち入り条件など"></textarea>

    <button type="submit">解体物件を登録する</button>
  </form>
</section>

<script>
  window.FILL_DISPLAY_NAME_FROM_LIFF = true;
  window.LIFF_ID = {{ LIFF_ID|tojson }};
</script>
<script src="{{ url_for('static', filename='js/liff.js') }}"></script>
{% endblock %}
